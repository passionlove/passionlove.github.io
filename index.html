<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🀄 我要验牌！</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 标题区域 */
        .header {
            text-align: center;
            padding: 30px 0;
        }

        .header h1 {
            font-size: 3em;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            margin-bottom: 10px;
        }

        .header p {
            color: #888;
            font-size: 1.1em;
        }

        /* 游戏区域 */
        .game-area {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 对手区域 */
        .opponent-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .opponent-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            margin: 0 auto 15px;
            box-shadow: 0 5px 20px rgba(231, 76, 60, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .opponent-name {
            font-size: 1.3em;
            color: #e74c3c;
            font-weight: bold;
        }

        .opponent-speech {
            background: rgba(231, 76, 60, 0.2);
            border-radius: 15px;
            padding: 15px 25px;
            margin-top: 15px;
            display: inline-block;
            position: relative;
            max-width: 80%;
            font-size: 1.1em;
        }

        .opponent-speech::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 10px solid rgba(231, 76, 60, 0.2);
        }

        /* 牌桌 */
        .table {
            background: linear-gradient(145deg, #0d5c0d, #0a4a0a);
            border-radius: 15px;
            padding: 30px;
            margin: 20px 0;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.5);
            border: 3px solid #2d2d2d;
        }

        .hand-label {
            color: #aaa;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .tiles-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            min-height: 80px;
            align-items: center;
        }

        .tile {
            width: 50px;
            height: 70px;
            background: linear-gradient(180deg, #f5f5f5 0%, #e0e0e0 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3), inset 0 -3px 0 rgba(0, 0, 0, 0.1);
            user-select: none;
            position: relative;
        }

        .tile:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        .tile.hidden {
            background: linear-gradient(180deg, #2ecc71, #27ae60);
            color: transparent;
        }

        .tile.hidden::after {
            content: '🀫';
            position: absolute;
            color: white;
            font-size: 1.5em;
        }

        .tile.revealed {
            animation: reveal 0.5s ease;
        }

        @keyframes reveal {
            0% { transform: rotateY(90deg); }
            100% { transform: rotateY(0deg); }
        }

        .tile.highlight {
            box-shadow: 0 0 20px #ffd700, 0 4px 8px rgba(0, 0, 0, 0.3);
            animation: glow 1s infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 20px #ffd700; }
            to { box-shadow: 0 0 40px #ffd700; }
        }

        /* 分数和状态 */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #ffd700;
        }

        .stat-label {
            color: #888;
            font-size: 0.9em;
        }

        /* 按钮 */
        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 35px;
            font-size: 1.2em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-verify {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            box-shadow: 0 5px 20px rgba(231, 76, 60, 0.4);
        }

        .btn-verify:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(231, 76, 60, 0.6);
        }

        .btn-trust {
            background: linear-gradient(135deg, #27ae60, #1e8449);
            color: white;
            box-shadow: 0 5px 20px rgba(39, 174, 96, 0.4);
        }

        .btn-trust:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(39, 174, 96, 0.6);
        }

        .btn-next {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            box-shadow: 0 5px 20px rgba(52, 152, 219, 0.4);
        }

        .btn-next:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(52, 152, 219, 0.6);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* 结果弹窗 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            transform: scale(0.8);
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }

        .modal.show .modal-content {
            transform: scale(1);
        }

        .modal-emoji {
            font-size: 5em;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 2em;
            margin-bottom: 15px;
        }

        .modal-text {
            color: #aaa;
            margin-bottom: 25px;
            font-size: 1.1em;
            line-height: 1.6;
        }

        /* 历史记录 */
        .history {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
        }

        .history h3 {
            margin-bottom: 15px;
            color: #ffd700;
        }

        .history-item {
            padding: 10px 15px;
            margin: 8px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95em;
        }

        .history-item.cheater {
            background: rgba(231, 76, 60, 0.2);
            border-left: 3px solid #e74c3c;
        }

        .history-item.honest {
            background: rgba(39, 174, 96, 0.2);
            border-left: 3px solid #27ae60;
        }

        .history-result {
            font-weight: bold;
        }

        .history-result.win { color: #2ecc71; }
        .history-result.lose { color: #e74c3c; }

        /* 教程提示 */
        .tutorial {
            background: rgba(52, 152, 219, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #3498db;
        }

        .tutorial h4 {
            color: #3498db;
            margin-bottom: 10px;
        }

        .tutorial ul {
            color: #aaa;
            padding-left: 20px;
        }

        .tutorial li {
            margin: 8px 0;
        }

        /* 对手表情 */
        .opponent-emotion {
            font-size: 3em;
            margin: 10px 0;
            transition: all 0.3s ease;
        }

        /* 验牌动画 */
        .verifying {
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* 作弊证据高亮 */
        .cheat-evidence {
            color: #e74c3c;
            font-weight: bold;
            text-decoration: underline;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .header h1 { font-size: 2em; }
            .tile { width: 40px; height: 55px; font-size: 1.4em; }
            .btn { padding: 12px 25px; font-size: 1em; }
            .stats-bar { flex-direction: column; gap: 15px; }
        }

        /* 胜利特效 */
        .confetti {
            position: fixed;
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🀄 我要验牌！</h1>
            <p>观察对手的牌，判断他是否在作弊</p>
        </div>

        <div class="tutorial" id="tutorial">
            <h4>📖 游戏规则</h4>
            <ul>
                <li><strong>对手</strong>会声称自己胡了某种牌型</li>
                <li><strong>观察</strong>他展示的牌，判断是否作弊</li>
                <li><strong>验牌成功</strong>：抓到作弊者 +200分，冤枉好人 -100分</li>
                <li><strong>选择相信</strong>：放过作弊者 -150分，信任诚实人 +50分</li>
                <li>提示：注意<span class="cheat-evidence">重复的牌</span>、<span class="cheat-evidence">不存在的牌</span>、<span class="cheat-evidence">数量异常</span></li>
            </ul>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">分数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="round">1</div>
                <div class="stat-label">回合</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="accuracy">0%</div>
                <div class="stat-label">准确率</div>
            </div>
        </div>

        <div class="game-area">
            <div class="opponent-area">
                <div class="opponent-avatar">😏</div>
                <div class="opponent-name" id="opponent-name">神秘牌友</div>
                <div class="opponent-emotion" id="opponent-emotion"></div>
                <div class="opponent-speech" id="opponent-speech">
                    准备好了吗？来看看你的眼力！
                </div>
            </div>

            <div class="table">
                <div class="hand-label">对手展示的牌：</div>
                <div class="tiles-container" id="tiles-container">
                    <!-- 牌会动态生成 -->
                </div>
            </div>

            <div class="buttons" id="game-buttons">
                <button class="btn btn-verify" id="btn-verify" onclick="verify()">
                    🔍 我要验牌！
                </button>
                <button class="btn btn-trust" id="btn-trust" onclick="trust()">
                    ✨ 我相信你
                </button>
            </div>

            <div class="buttons" id="next-buttons" style="display: none;">
                <button class="btn btn-next" onclick="nextRound()">
                    ➡️ 下一局
                </button>
            </div>
        </div>

        <div class="history" id="history" style="display: none;">
            <h3>📜 历史记录</h3>
            <div id="history-list"></div>
        </div>
    </div>

    <!-- 结果弹窗 -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-emoji" id="modal-emoji">🎉</div>
            <div class="modal-title" id="modal-title">验牌结果</div>
            <div class="modal-text" id="modal-text">内容</div>
            <button class="btn btn-next" onclick="closeModal()">确定</button>
        </div>
    </div>

    <script>
        // ============ 游戏数据 ============
        
        // 麻将牌定义
        const TILES = {
            // 万
            wan: ['🀇', '🀈', '🀉', '🀊', '🀋', '🀌', '🀍', '🀎', '🀏'],
            // 条（索）
            tiao: ['🀐', '🀑', '🀒', '🀓', '🀔', '🀕', '🀖', '🀗', '🀘'],
            // 饼（筒）
            bing: ['🀙', '🀚', '🀛', '🀜', '🀝', '🀞', '🀟', '🀠', '🀡'],
            // 字牌
            zi: ['🀀', '🀁', '🀂', '🀃', '🀆', '🀅', '🀄']
        };

        // 牌型定义
        const HAND_TYPES = [
            { name: '清一色', desc: '全是同一门牌', tiles: 14, singleSuit: true },
            { name: '对对胡', desc: '全是对子和刻子', tiles: 14, pairs: true },
            { name: '七对子', desc: '七组对子', tiles: 14, sevenPairs: true },
            { name: '大三元', desc: '中发白都是刻子', tiles: 14, dragons: true },
            { name: '清龙', desc: '一条龙123456789', tiles: 14, straight: true },
            { name: '十三幺', desc: '一九字牌各一张加一对', tiles: 14, thirteenOrphans: true },
        ];

        // 对手名字池
        const OPPONENT_NAMES = [
            '隔壁老王', '麻将小王子', '赌神本神', '欧皇附体', '常胜将军',
            '手气爆棚', '逢赌必赢', '摸啥来啥', '天选之人', '血流成河',
            '人形外挂', '概率杀手', '命运之手', '牌桌霸主', '自摸达人'
        ];

        // 对手台词
        const SPEECHES = {
            claim: [
                '哈哈，又胡了！今天手气太好了！',
                '不好意思，我又赢了~',
                '这把清一色，美滋滋！',
                '嘿嘿，你们慢慢打，我先胡为敬',
                '什么叫实力？这就是实力！',
                '抱歉啊，天生好命',
                '这牌太顺了，我自己都不敢信',
                '运气来了挡都挡不住啊！'
            ],
            caught: [
                '啊这...你怎么发现的？！',
                '冤枉啊！我没有！我不是！',
                '这个...我能解释...',
                '卧槽，被抓到了...',
                '你...你验什么牌啊！',
                '不是...你听我说...'
            ],
            innocent: [
                '？？？我没作弊啊？？',
                '你也太多疑了吧！',
                '冤枉！大冤种！',
                '我的牌明明是对的！',
                '服了，好心被当驴肝肺'
            ],
            trusted: [
                '嘿嘿，你真是好人~',
                '就说我没骗人嘛！',
                '谢谢信任哦~',
                '不愧是懂行的人！'
            ],
            fooled: [
                '（内心：这人真好骗）',
                '（悄悄收起多余的牌）',
                '嘿嘿嘿...',
                '谢谢，下次还敢！'
            ]
        };

        // ============ 游戏状态 ============
        let gameState = {
            score: 0,
            round: 1,
            correctGuesses: 0,
            totalGuesses: 0,
            currentHand: null,
            isCheating: false,
            cheatType: '',
            cheatDetails: '',
            history: [],
            opponentName: ''
        };

        // ============ 工具函数 ============
        
        function random(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function shuffle(arr) {
            const result = [...arr];
            for (let i = result.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [result[i], result[j]] = [result[j], result[i]];
            }
            return result;
        }

        function getAllTiles() {
            return [...TILES.wan, ...TILES.tiao, ...TILES.bing, ...TILES.zi];
        }

        // ============ 生成牌型 ============

        // 生成正常的清一色
        function generateQingyise() {
            const suit = random([TILES.wan, TILES.tiao, TILES.bing]);
            const hand = [];
            // 生成4组 + 1对
            for (let i = 0; i < 4; i++) {
                const tile = random(suit);
                hand.push(tile, tile, tile);
            }
            const pair = random(suit);
            hand.push(pair, pair);
            return shuffle(hand);
        }

        // 生成正常的七对子
        function generateSevenPairs() {
            const all = [...TILES.wan, ...TILES.tiao, ...TILES.bing];
            const selected = shuffle(all).slice(0, 7);
            const hand = [];
            selected.forEach(tile => hand.push(tile, tile));
            return shuffle(hand);
        }

        // 生成正常的对对胡
        function generateDuiduihu() {
            const all = getAllTiles();
            const selected = shuffle(all).slice(0, 5);
            const hand = [];
            selected.slice(0, 4).forEach(tile => hand.push(tile, tile, tile));
            const pair = selected[4];
            hand.push(pair, pair);
            return shuffle(hand);
        }

        // 生成正常的大三元
        function generateDasanyuan() {
            const dragons = ['🀆', '🀅', '🀄'];
            const hand = [];
            dragons.forEach(d => hand.push(d, d, d));
            // 加一组其他的刻子和对子
            const other = random([...TILES.wan, ...TILES.tiao, ...TILES.bing]);
            hand.push(other, other, other);
            const pair = random([...TILES.wan, ...TILES.tiao, ...TILES.bing].filter(t => t !== other));
            hand.push(pair, pair);
            return shuffle(hand);
        }

        // 生成正常的清龙
        function generateQinglong() {
            const suit = random([TILES.wan, TILES.tiao, TILES.bing]);
            const hand = [...suit]; // 1-9
            // 加一组刻子和对子
            const triplet = random(suit);
            hand.push(triplet, triplet, triplet);
            const pair = random(suit.filter(t => t !== triplet));
            hand.push(pair, pair);
            return shuffle(hand);
        }

        // 生成正常的十三幺
        function generateShisanyao() {
            const terminals = [TILES.wan[0], TILES.wan[8], TILES.tiao[0], TILES.tiao[8], TILES.bing[0], TILES.bing[8]];
            const honors = TILES.zi;
            const hand = [...terminals, ...honors];
            // 加一张作为对子
            const pair = random(hand);
            hand.push(pair);
            return shuffle(hand);
        }

        // ============ 作弊方式 ============

        function cheatDuplicateTile(hand) {
            // 加入过多重复牌（超过4张）
            const tile = random(hand);
            const count = hand.filter(t => t === tile).length;
            if (count <= 3) {
                const idx = Math.floor(Math.random() * hand.length);
                hand[idx] = tile;
                return { 
                    type: '重复牌过多', 
                    detail: `${tile} 出现了超过4次，而每种牌最多只有4张！`
                };
            }
            return null;
        }

        function cheatWrongCount(hand) {
            // 牌数不对
            if (Math.random() > 0.5) {
                hand.push(random(getAllTiles()));
                return { type: '牌数异常', detail: '胡牌应该是14张，这里有15张！' };
            } else {
                hand.pop();
                return { type: '牌数异常', detail: '胡牌应该是14张，这里只有13张！' };
            }
        }

        function cheatMixedSuit(hand, shouldBePure) {
            // 清一色混入其他花色
            if (shouldBePure) {
                const currentSuit = hand[0];
                let otherSuits;
                if (TILES.wan.includes(currentSuit)) {
                    otherSuits = [...TILES.tiao, ...TILES.bing];
                } else if (TILES.tiao.includes(currentSuit)) {
                    otherSuits = [...TILES.wan, ...TILES.bing];
                } else {
                    otherSuits = [...TILES.wan, ...TILES.tiao];
                }
                const intruder = random(otherSuits);
                const idx = Math.floor(Math.random() * hand.length);
                hand[idx] = intruder;
                return { 
                    type: '花色不纯', 
                    detail: `清一色里混入了 ${intruder}，这不是同一门花色！`
                };
            }
            return null;
        }

        function cheatOddPair(hand, shouldBePairs) {
            // 七对子里有单张
            if (shouldBePairs) {
                // 把一对改成两张不同的
                const idx = Math.floor(Math.random() * 6) * 2;
                const replacement = random(getAllTiles().filter(t => !hand.includes(t)));
                hand[idx] = replacement;
                return { 
                    type: '不成对', 
                    detail: `七对子里有单张 ${replacement}，这不是对子！`
                };
            }
            return null;
        }

        function cheatFakeDragon(hand) {
            // 大三元没凑齐三元
            const dragons = ['🀆', '🀅', '🀄'];
            const missingDragon = random(dragons);
            const replacement = random([...TILES.wan, ...TILES.tiao, ...TILES.bing]);
            for (let i = 0; i < hand.length; i++) {
                if (hand[i] === missingDragon) {
                    hand[i] = replacement;
                }
            }
            return { 
                type: '三元不全', 
                detail: `大三元需要中发白都是刻子，但是缺少 ${missingDragon}！`
            };
        }

        function cheatBrokenStraight(hand, isStraight) {
            // 清龙断了
            if (isStraight) {
                const suit = TILES.wan.includes(hand[0]) ? TILES.wan : 
                            TILES.tiao.includes(hand[0]) ? TILES.tiao : TILES.bing;
                // 随机替换一张序数牌
                const toRemove = random(suit);
                const idx = hand.indexOf(toRemove);
                if (idx !== -1) {
                    const replacement = random(suit);
                    hand[idx] = replacement;
                    return { 
                        type: '龙不完整', 
                        detail: `清龙需要123456789连续，但是 ${toRemove} 被换成了 ${replacement}！`
                    };
                }
            }
            return null;
        }

        // ============ 生成当局 ============

        function generateRound() {
            const handType = random(HAND_TYPES);
            let hand;
            
            // 根据牌型生成
            switch (handType.name) {
                case '清一色':
                    hand = generateQingyise();
                    break;
                case '七对子':
                    hand = generateSevenPairs();
                    break;
                case '对对胡':
                    hand = generateDuiduihu();
                    break;
                case '大三元':
                    hand = generateDasanyuan();
                    break;
                case '清龙':
                    hand = generateQinglong();
                    break;
                case '十三幺':
                    hand = generateShisanyao();
                    break;
                default:
                    hand = generateQingyise();
            }

            // 决定是否作弊（50%概率）
            const willCheat = Math.random() < 0.5;
            let cheatInfo = null;

            if (willCheat) {
                // 随机选择作弊方式
                const cheatMethods = [];
                
                if (handType.singleSuit) {
                    cheatMethods.push(() => cheatMixedSuit(hand, true));
                }
                if (handType.sevenPairs) {
                    cheatMethods.push(() => cheatOddPair(hand, true));
                }
                if (handType.dragons) {
                    cheatMethods.push(() => cheatFakeDragon(hand));
                }
                if (handType.straight) {
                    cheatMethods.push(() => cheatBrokenStraight(hand, true));
                }
                // 通用作弊方式
                cheatMethods.push(() => cheatDuplicateTile(hand));
                cheatMethods.push(() => cheatWrongCount(hand));

                // 尝试作弊
                const method = random(cheatMethods);
                cheatInfo = method();
            }

            // 设置游戏状态
            gameState.currentHand = hand;
            gameState.handType = handType;
            gameState.isCheating = cheatInfo !== null;
            gameState.cheatType = cheatInfo ? cheatInfo.type : '';
            gameState.cheatDetails = cheatInfo ? cheatInfo.detail : '';
            gameState.opponentName = random(OPPONENT_NAMES);

            return { hand, handType, isCheating: gameState.isCheating };
        }

        // ============ UI 更新 ============

        function renderTiles(hand, reveal = false) {
            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            
            hand.forEach((tile, index) => {
                const div = document.createElement('div');
                div.className = 'tile';
                div.textContent = tile;
                div.style.animationDelay = `${index * 0.05}s`;
                container.appendChild(div);
            });
        }

        function updateStats() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('round').textContent = gameState.round;
            const accuracy = gameState.totalGuesses > 0 
                ? Math.round(gameState.correctGuesses / gameState.totalGuesses * 100) 
                : 0;
            document.getElementById('accuracy').textContent = accuracy + '%';
        }

        function updateOpponent() {
            document.getElementById('opponent-name').textContent = gameState.opponentName;
            document.getElementById('opponent-speech').textContent = random(SPEECHES.claim);
            document.getElementById('opponent-emotion').textContent = '';
        }

        function showResult(isCorrect, wasVerify) {
            const modal = document.getElementById('modal');
            const emoji = document.getElementById('modal-emoji');
            const title = document.getElementById('modal-title');
            const text = document.getElementById('modal-text');
            const opponentEmotion = document.getElementById('opponent-emotion');
            const opponentSpeech = document.getElementById('opponent-speech');

            let scoreChange = 0;
            
            if (wasVerify) {
                if (gameState.isCheating) {
                    // 验牌成功，抓到作弊者
                    emoji.textContent = '🎉';
                    title.textContent = '验牌成功！';
                    title.style.color = '#2ecc71';
                    text.innerHTML = `<strong>果然是骗子！</strong><br><br>
                        作弊方式：<span style="color:#e74c3c">${gameState.cheatType}</span><br>
                        ${gameState.cheatDetails}<br><br>
                        <span style="color:#2ecc71">+200分</span>`;
                    scoreChange = 200;
                    opponentEmotion.textContent = '😰';
                    opponentSpeech.textContent = random(SPEECHES.caught);
                    
                    // 高亮作弊的牌
                    highlightCheats();
                } else {
                    // 验牌失败，冤枉好人
                    emoji.textContent = '😅';
                    title.textContent = '冤枉好人了...';
                    title.style.color = '#e74c3c';
                    text.innerHTML = `<strong>人家没作弊啊！</strong><br><br>
                        "${gameState.handType.name}"是正当的牌型。<br><br>
                        <span style="color:#e74c3c">-100分</span>`;
                    scoreChange = -100;
                    opponentEmotion.textContent = '😤';
                    opponentSpeech.textContent = random(SPEECHES.innocent);
                }
            } else {
                if (gameState.isCheating) {
                    // 相信了骗子
                    emoji.textContent = '🤡';
                    title.textContent = '被骗了！';
                    title.style.color = '#e74c3c';
                    text.innerHTML = `<strong>他在作弊！</strong><br><br>
                        作弊方式：<span style="color:#e74c3c">${gameState.cheatType}</span><br>
                        ${gameState.cheatDetails}<br><br>
                        <span style="color:#e74c3c">-150分</span>`;
                    scoreChange = -150;
                    opponentEmotion.textContent = '😈';
                    opponentSpeech.textContent = random(SPEECHES.fooled);
                    
                    highlightCheats();
                } else {
                    // 相信了诚实人
                    emoji.textContent = '🤝';
                    title.textContent = '信任正确！';
                    title.style.color = '#2ecc71';
                    text.innerHTML = `<strong>他确实没作弊~</strong><br><br>
                        "${gameState.handType.name}"是正当的牌型。<br><br>
                        <span style="color:#2ecc71">+50分</span>`;
                    scoreChange = 50;
                    opponentEmotion.textContent = '😊';
                    opponentSpeech.textContent = random(SPEECHES.trusted);
                }
            }

            gameState.score += scoreChange;
            gameState.totalGuesses++;
            if (isCorrect) gameState.correctGuesses++;

            // 记录历史
            gameState.history.unshift({
                round: gameState.round,
                handType: gameState.handType.name,
                wasCheating: gameState.isCheating,
                action: wasVerify ? '验牌' : '相信',
                correct: isCorrect,
                scoreChange: scoreChange
            });

            updateStats();
            renderHistory();

            modal.classList.add('show');
            
            // 隐藏游戏按钮，显示下一局按钮
            document.getElementById('game-buttons').style.display = 'none';
            document.getElementById('next-buttons').style.display = 'flex';

            // 胜利撒花
            if (isCorrect && wasVerify && gameState.isCheating) {
                createConfetti();
            }
        }

        function highlightCheats() {
            const tiles = document.querySelectorAll('.tile');
            // 简单地给所有牌加个动画效果
            tiles.forEach(tile => {
                tile.classList.add('revealed');
            });
        }

        function renderHistory() {
            const historyDiv = document.getElementById('history');
            const listDiv = document.getElementById('history-list');
            
            if (gameState.history.length > 0) {
                historyDiv.style.display = 'block';
                listDiv.innerHTML = gameState.history.slice(0, 10).map(h => `
                    <div class="history-item ${h.wasCheating ? 'cheater' : 'honest'}">
                        <span>第${h.round}局 - ${h.handType} - ${h.action}</span>
                        <span class="history-result ${h.correct ? 'win' : 'lose'}">
                            ${h.correct ? '✓' : '✗'} ${h.scoreChange > 0 ? '+' : ''}${h.scoreChange}
                        </span>
                    </div>
                `).join('');
            }
        }

        // ============ 游戏控制 ============

        function verify() {
            const table = document.querySelector('.table');
            table.classList.add('verifying');
            setTimeout(() => table.classList.remove('verifying'), 500);

            const isCorrect = gameState.isCheating === true;
            showResult(isCorrect, true);
        }

        function trust() {
            const isCorrect = gameState.isCheating === false;
            showResult(isCorrect, false);
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }

        function nextRound() {
            gameState.round++;
            
            // 隐藏教程（第3回合后）
            if (gameState.round >= 3) {
                document.getElementById('tutorial').style.display = 'none';
            }

            const { hand } = generateRound();
            renderTiles(hand);
            updateOpponent();
            updateStats();

            document.getElementById('game-buttons').style.display = 'flex';
            document.getElementById('next-buttons').style.display = 'none';
        }

        function createConfetti() {
            const colors = ['#ffd700', '#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ff9ff3'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.cssText = `
                    position: fixed;
                    width: 10px;
                    height: 10px;
                    background: ${random(colors)};
                    left: ${Math.random() * 100}vw;
                    top: -10px;
                    border-radius: ${Math.random() > 0.5 ? '50%' : '0'};
                    animation: fall ${2 + Math.random() * 2}s linear forwards;
                `;
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 4000);
            }

            // 添加掉落动画
            if (!document.getElementById('confetti-style')) {
                const style = document.createElement('style');
                style.id = 'confetti-style';
                style.textContent = `
                    @keyframes fall {
                        to {
                            transform: translateY(100vh) rotate(720deg);
                            opacity: 0;
                        }
                    }
                `;
                document.head.appendChild(style);
            }
        }

        // ============ 初始化 ============

        function init() {
            const { hand } = generateRound();
            renderTiles(hand);
            updateOpponent();
            updateStats();
        }

        // 启动游戏
        init();
    </script>
</body>
</html>
